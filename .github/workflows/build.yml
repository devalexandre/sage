name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: sage
  PYTHON_VERSION: "3.12"
  WINDOWS_STORE_IDENTITY_NAME: dev2learn.SageLearn
  WINDOWS_STORE_PUBLISHER: CN=3011FB39-8A46-4C3F-8825-1E61E7D7166A
  WINDOWS_STORE_PUBLISHER_DISPLAY_NAME: dev2learn
  WINDOWS_STORE_DISPLAY_NAME: SageLearn

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Derive version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    needs: metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ needs.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-linux-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libfuse2 ccache
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo install -m755 appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: dist/app.build
          key: nuitka-linux-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**') }}
          restore-keys: nuitka-linux-

      - name: Cache compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ runner.os }}-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**', 'pyproject.toml') }}
          restore-keys: ccache-linux-${{ runner.os }}-

      - name: Setup venv & deps
        run: |
          if [ ! -x .venv/bin/python ]; then
            python -m venv .venv
          fi
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .
          .venv/bin/python -m pip install nuitka ordered-set zstandard pillow

      - name: Generate icons
        run: .venv/bin/python packaging/generate_icon.py

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: dist/app.build
        run: |
          MILVUS_LITE_DIR=$(.venv/bin/python -c 'import milvus_lite, pathlib; print(pathlib.Path(milvus_lite.__file__).resolve().parent)')
          .venv/bin/python -m nuitka \
            --onefile \
            --jobs=4 \
            --enable-plugin=pyside6 \
            --include-package=core \
            --include-package=ui \
            --include-package=db \
            --include-package=pynput \
            --include-package=milvus_lite \
            --include-package-data=milvus_lite \
            --include-data-dir="${MILVUS_LITE_DIR}/lib=milvus_lite/lib" \
            --output-dir=dist \
            --output-filename=${{ env.APP_NAME }} \
            --linux-icon=assets/sage.png \
            app.py

      - name: Package AppImage
        run: |
          VERSION=${{ needs.metadata.outputs.version }}
          rm -rf packaging/linux/sage.AppDir/usr
          mkdir -p packaging/linux/sage.AppDir/usr/bin
          cp dist/${{ env.APP_NAME }} packaging/linux/sage.AppDir/usr/bin/${{ env.APP_NAME }}
          chmod +x packaging/linux/sage.AppDir/usr/bin/${{ env.APP_NAME }}
          cp assets/sage.png packaging/linux/sage.AppDir/sage.png
          ARCH=x86_64 appimagetool packaging/linux/sage.AppDir "dist/Sage-${VERSION}-x86_64.AppImage"

      - name: Build .deb package
        run: make build-deb VERSION=${{ needs.metadata.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/${{ env.APP_NAME }}
            dist/Sage-${{ needs.metadata.outputs.version }}-x86_64.AppImage
            dist/${{ env.APP_NAME }}_${{ needs.metadata.outputs.version }}_amd64.deb

  # ── Arch Linux package ──────────────────────────────────────────────────
  build-arch:
    needs: build-linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist

      - name: Build .pkg.tar.zst
        run: |
          chmod +x dist/${{ env.APP_NAME }}
          rm -rf dist/arch-staging
          mkdir -p dist/arch-staging
          # Patch PKGBUILD version from tag
          sed "s/^pkgver=.*/pkgver=${VERSION}/" packaging/linux/arch/PKGBUILD > dist/arch-staging/PKGBUILD
          cp packaging/linux/arch/sage.install dist/arch-staging/
          cp dist/${{ env.APP_NAME }} dist/arch-staging/${{ env.APP_NAME }}
          cp assets/sage.png dist/arch-staging/sage.png
          cp packaging/linux/sage.AppDir/sage.desktop dist/arch-staging/sage.desktop
          # makepkg cannot run as root — create a build user
          useradd -m builder
          chown -R builder:builder dist/arch-staging
          cd dist/arch-staging && su builder -c "makepkg -f"
          cd "$GITHUB_WORKSPACE"
          cp dist/arch-staging/${{ env.APP_NAME }}-${VERSION}-*-x86_64.pkg.tar.zst dist/

      - uses: actions/upload-artifact@v4
        with:
          name: arch-build
          path: dist/${{ env.APP_NAME }}-${{ env.VERSION }}-*-x86_64.pkg.tar.zst

  # ── Windows exe + installer ────────────────────────────────────────────────
  build-windows:
    needs: metadata
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-win-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: dist\app.build
          key: nuitka-win-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**') }}
          restore-keys: nuitka-win-

      - name: Setup venv & deps
        run: |
          if (!(Test-Path ".venv\Scripts\python.exe")) { python -m venv .venv }
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\python -m pip install -e .
          .venv\Scripts\python -m pip install nuitka ordered-set zstandard pillow

      - name: Generate icons
        run: .venv\Scripts\python packaging\generate_icon.py

      - name: Build with Nuitka
        run: |
          $MILVUS_LITE_DIR = .venv\Scripts\python -c "import importlib.util, pathlib; spec = importlib.util.find_spec('milvus_lite'); print(pathlib.Path(spec.origin).resolve().parent if spec and spec.origin else '')"
          $nuitkaArgs = @(
            "--onefile",
            "--jobs=4",
            "--assume-yes-for-download",
            "--enable-plugin=pyside6",
            "--include-package=core",
            "--include-package=ui",
            "--include-package=db",
            "--include-package=pynput",
            "--output-dir=dist",
            "--output-filename=${{ env.APP_NAME }}.exe",
            "--windows-icon-from-ico=assets\sage.ico",
            "--windows-console-mode=disable",
            "--company-name=Alexandre E Souza",
            "--product-name=Sage",
            "--file-version=${{ env.VERSION }}.0",
            "--product-version=${{ env.VERSION }}.0",
            "--file-description=Sage - Personal Knowledge Widget",
            "app.py"
          )
          if ($LASTEXITCODE -eq 0 -and $MILVUS_LITE_DIR -and (Test-Path (Join-Path $MILVUS_LITE_DIR "lib"))) {
            $nuitkaArgs = @(
              "--include-package=milvus_lite",
              "--include-package-data=milvus_lite",
              "--include-data-dir=$MILVUS_LITE_DIR\lib=milvus_lite/lib"
            ) + $nuitkaArgs
          } else {
            Write-Host "milvus_lite not installed on this runner; building without bundled milvus_lite assets."
          }
          .venv\Scripts\python -m nuitka @nuitkaArgs

      # ── MSIX package (unsigned — Microsoft Store signs it) ──
      - name: Build MSIX package
        run: |
          $msixDir = "dist\msix"
          New-Item -ItemType Directory -Force -Path $msixDir
          Copy-Item "dist\${{ env.APP_NAME }}.exe" "$msixDir\${{ env.APP_NAME }}.exe"
          Copy-Item "assets\sage.png" "$msixDir\sage.png"

          @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
                   xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
                   xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
            <Identity Name="${{ env.WINDOWS_STORE_IDENTITY_NAME }}"
                      Publisher="${{ env.WINDOWS_STORE_PUBLISHER }}"
                      Version="${{ env.VERSION }}.0"
                      ProcessorArchitecture="x64" />
            <Properties>
              <DisplayName>${{ env.WINDOWS_STORE_DISPLAY_NAME }}</DisplayName>
              <PublisherDisplayName>${{ env.WINDOWS_STORE_PUBLISHER_DISPLAY_NAME }}</PublisherDisplayName>
              <Logo>sage.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>
            <Resources>
              <Resource Language="en-us" />
            </Resources>
            <Applications>
              <Application Id="Sage" Executable="sage.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="${{ env.WINDOWS_STORE_DISPLAY_NAME }}"
                                    Description="Personal Knowledge Widget"
                                    Square150x150Logo="sage.png"
                                    Square44x44Logo="sage.png"
                                    BackgroundColor="transparent" />
              </Application>
            </Applications>
            <Capabilities>
              <Capability Name="internetClient" />
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@ | Out-File -Encoding utf8 "$msixDir\AppxManifest.xml"

          # Find makeappx.exe dynamically
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) { throw "makeappx.exe not found" }
          Write-Host "Using: $makeappx"
          & $makeappx pack /d $msixDir /p "dist\Sage-${{ env.VERSION }}.msix" /o

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Sage-${{ env.VERSION }}.msix

  # ── macOS .app ────────────────────────────────────────────────────────────
  build-macos:
    needs: metadata
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-mac-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: dist/app.build
          key: nuitka-mac-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**') }}
          restore-keys: nuitka-mac-

      - name: Cache compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-mac-${{ runner.os }}-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**', 'pyproject.toml') }}
          restore-keys: ccache-mac-${{ runner.os }}-

      - name: Install system deps
        run: brew install ccache create-dmg

      - name: Setup venv & deps
        run: |
          if [ ! -x .venv/bin/python ]; then
            python -m venv .venv
          fi
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .
          .venv/bin/python -m pip install nuitka ordered-set zstandard pillow imageio

      - name: Generate icons
        run: .venv/bin/python packaging/generate_icon.py

      - name: Build with Nuitka
        run: |
          MILVUS_LITE_DIR=$(.venv/bin/python -c 'import milvus_lite, pathlib; print(pathlib.Path(milvus_lite.__file__).resolve().parent)')
          .venv/bin/python -m nuitka \
            --standalone \
            --jobs=4 \
            --assume-yes-for-download \
            --enable-plugin=pyside6 \
            --include-package=core \
            --include-package=ui \
            --include-package=db \
            --include-package=pynput \
            --include-package=milvus_lite \
            --include-package-data=milvus_lite \
            --include-data-dir="${MILVUS_LITE_DIR}/lib=milvus_lite/lib" \
            --output-dir=dist \
            --output-filename=${{ env.APP_NAME }} \
            --macos-create-app-bundle \
            --macos-app-icon=assets/sage.png \
            --macos-app-name=Sage \
            app.py

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Sage" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "app.app" 150 200 \
            --app-drop-link 450 200 \
            "dist/Sage-${{ env.VERSION }}-macOS.dmg" \
            "dist/app.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Sage-${{ env.VERSION }}-macOS.dmg

  # ── GitHub Release (only on tag push) ──────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [metadata, build-linux, build-arch, build-windows, build-macos]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-build/Sage-${{ env.VERSION }}-x86_64.AppImage
            artifacts/linux-build/${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb
            artifacts/arch-build/${{ env.APP_NAME }}-${{ env.VERSION }}-*-x86_64.pkg.tar.zst
            artifacts/windows-build/Sage-${{ env.VERSION }}.msix
            artifacts/macos-build/Sage-${{ env.VERSION }}-macOS.dmg
          generate_release_notes: true
