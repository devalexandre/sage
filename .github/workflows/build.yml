name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: sage
  PYTHON_VERSION: "3.12"

jobs:
  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libfuse2
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo install -m755 appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: dist/app.build
          key: nuitka-linux-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**') }}
          restore-keys: nuitka-linux-

      - name: Setup venv & deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .
          .venv/bin/pip install nuitka ordered-set zstandard pillow

      - name: Generate icons
        run: .venv/bin/python packaging/generate_icon.py

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: dist/app.build
        run: |
          .venv/bin/python -m nuitka \
            --onefile \
            --enable-plugin=pyside6 \
            --include-package=core \
            --include-package=ui \
            --include-package=db \
            --include-package=pynput \
            --output-dir=dist \
            --output-filename=${{ env.APP_NAME }} \
            --linux-icon=assets/sage.png \
            app.py

      - name: Package AppImage
        run: |
          VERSION=${{ steps.version.outputs.value }}
          rm -rf packaging/linux/sage.AppDir/usr
          mkdir -p packaging/linux/sage.AppDir/usr/bin
          cp dist/${{ env.APP_NAME }} packaging/linux/sage.AppDir/usr/bin/${{ env.APP_NAME }}
          chmod +x packaging/linux/sage.AppDir/usr/bin/${{ env.APP_NAME }}
          cp assets/sage.png packaging/linux/sage.AppDir/sage.png
          ARCH=x86_64 appimagetool packaging/linux/sage.AppDir "dist/Sage-${VERSION}-x86_64.AppImage"

      - name: Build .deb package
        run: make build-deb VERSION=${{ steps.version.outputs.value }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/${{ env.APP_NAME }}
            dist/Sage-${{ steps.version.outputs.value }}-x86_64.AppImage
            dist/${{ env.APP_NAME }}_${{ steps.version.outputs.value }}_amd64.deb

  # ── Arch Linux package ──────────────────────────────────────────────────
  build-arch:
    needs: build-linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist

      - name: Build .pkg.tar.zst
        run: |
          chmod +x dist/${{ env.APP_NAME }}
          rm -rf dist/arch-staging
          mkdir -p dist/arch-staging
          # Patch PKGBUILD version from tag
          sed "s/^pkgver=.*/pkgver=${VERSION}/" packaging/linux/arch/PKGBUILD > dist/arch-staging/PKGBUILD
          cp packaging/linux/arch/sage.install dist/arch-staging/
          cp dist/${{ env.APP_NAME }} dist/arch-staging/${{ env.APP_NAME }}
          cp assets/sage.png dist/arch-staging/sage.png
          cp packaging/linux/sage.AppDir/sage.desktop dist/arch-staging/sage.desktop
          # makepkg cannot run as root — create a build user
          useradd -m builder
          chown -R builder:builder dist/arch-staging
          cd dist/arch-staging && su builder -c "makepkg -f"
          cd "$GITHUB_WORKSPACE"
          cp dist/arch-staging/${{ env.APP_NAME }}-${VERSION}-*-x86_64.pkg.tar.zst dist/

      - uses: actions/upload-artifact@v4
        with:
          name: arch-build
          path: dist/${{ env.APP_NAME }}-${{ env.VERSION }}-*-x86_64.pkg.tar.zst

  # ── Windows exe + installer ────────────────────────────────────────────────
  build-windows:
    needs: build-linux
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: dist\app.build
          key: nuitka-win-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**') }}
          restore-keys: nuitka-win-

      - name: Setup venv & deps
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -e .
          .venv\Scripts\pip install nuitka ordered-set zstandard pillow

      - name: Generate icons
        run: .venv\Scripts\python packaging\generate_icon.py

      - name: Build with Nuitka
        run: |
          .venv\Scripts\python -m nuitka `
            --onefile `
            --assume-yes-for-download `
            --enable-plugin=pyside6 `
            --include-package=core `
            --include-package=ui `
            --include-package=db `
            --include-package=pynput `
            --output-dir=dist `
            --output-filename=${{ env.APP_NAME }}.exe `
            --windows-icon-from-ico=assets\sage.ico `
            --windows-console-mode=disable `
            --company-name="Alexandre E Souza" `
            --product-name="Sage" `
            --file-version=${{ env.VERSION }}.0 `
            --product-version=${{ env.VERSION }}.0 `
            --file-description="Sage - Personal Knowledge Widget" `
            app.py

      # ── MSIX package (unsigned — Microsoft Store signs it) ──
      - name: Build MSIX package
        run: |
          $msixDir = "dist\msix"
          New-Item -ItemType Directory -Force -Path $msixDir
          Copy-Item "dist\${{ env.APP_NAME }}.exe" "$msixDir\${{ env.APP_NAME }}.exe"
          Copy-Item "assets\sage.png" "$msixDir\sage.png"

          @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
                   xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
                   xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
            <Identity Name="Sage.PersonalKnowledge"
                      Publisher="CN=Alexandre E Souza"
                      Version="${{ env.VERSION }}.0"
                      ProcessorArchitecture="x64" />
            <Properties>
              <DisplayName>Sage</DisplayName>
              <PublisherDisplayName>Alexandre E Souza</PublisherDisplayName>
              <Logo>sage.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>
            <Resources>
              <Resource Language="en-us" />
            </Resources>
            <Applications>
              <Application Id="Sage" Executable="sage.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="Sage"
                                    Description="Personal Knowledge Widget"
                                    Square150x150Logo="sage.png"
                                    Square44x44Logo="sage.png"
                                    BackgroundColor="transparent" />
              </Application>
            </Applications>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@ | Out-File -Encoding utf8 "$msixDir\AppxManifest.xml"

          # Find makeappx.exe dynamically
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) { throw "makeappx.exe not found" }
          Write-Host "Using: $makeappx"
          & $makeappx pack /d $msixDir /p "dist\Sage-${{ env.VERSION }}.msix" /o

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Sage-${{ env.VERSION }}.msix

  # ── macOS .app ────────────────────────────────────────────────────────────
  build-macos:
    needs: build-linux
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: dist/app.build
          key: nuitka-mac-${{ hashFiles('app.py', 'core/**', 'ui/**', 'db/**') }}
          restore-keys: nuitka-mac-

      - name: Setup venv & deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .
          .venv/bin/pip install nuitka ordered-set zstandard pillow imageio

      - name: Generate icons
        run: .venv/bin/python packaging/generate_icon.py

      - name: Build with Nuitka
        run: |
          .venv/bin/python -m nuitka \
            --standalone \
            --assume-yes-for-download \
            --enable-plugin=pyside6 \
            --include-package=core \
            --include-package=ui \
            --include-package=db \
            --include-package=pynput \
            --output-dir=dist \
            --output-filename=${{ env.APP_NAME }} \
            --macos-create-app-bundle \
            --macos-app-icon=assets/sage.png \
            --macos-app-name=Sage \
            app.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Sage" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "app.app" 150 200 \
            --app-drop-link 450 200 \
            "dist/Sage-${{ env.VERSION }}-macOS.dmg" \
            "dist/app.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Sage-${{ env.VERSION }}-macOS.dmg

  # ── GitHub Release (only on tag push) ──────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-arch, build-windows, build-macos]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-linux.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-build/Sage-${{ env.VERSION }}-x86_64.AppImage
            artifacts/linux-build/${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb
            artifacts/arch-build/${{ env.APP_NAME }}-${{ env.VERSION }}-*-x86_64.pkg.tar.zst
            artifacts/windows-build/Sage-${{ env.VERSION }}.msix
            artifacts/macos-build/Sage-${{ env.VERSION }}-macOS.dmg
          generate_release_notes: true

      - name: Publish to sage-releases (public repo)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --repo devalexandre/sage-releases \
            --title "Sage v${{ env.VERSION }}" \
            --notes "Sage v${{ env.VERSION }} release" \
            artifacts/linux-build/Sage-${{ env.VERSION }}-x86_64.AppImage \
            artifacts/linux-build/${{ env.APP_NAME }}_${{ env.VERSION }}_amd64.deb \
            artifacts/arch-build/${{ env.APP_NAME }}-${{ env.VERSION }}-*-x86_64.pkg.tar.zst \
            artifacts/windows-build/Sage-${{ env.VERSION }}.msix \
            artifacts/macos-build/Sage-${{ env.VERSION }}-macOS.dmg
